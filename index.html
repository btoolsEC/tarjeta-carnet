<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @page {
            size: 64mm 93mm;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 64mm;
            height: 93mm;
            background-color: white;
            position: relative;
            color: #333;
            text-align: center;
            border: 0.1mm solid #ddd;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card p {
            margin: 0;
            padding: 0;
            display: inline;
        }

        .cedula {
            position: absolute;
            top: 15mm;
            width: 100%;
            font-size: 14pt;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .qr-container {
            position: absolute;
            top: 28mm;
            left: 50%;
            transform: translateX(-50%);
            width: 32mm;
            height: 32mm;
            background: white;
            padding: 1mm;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        .qr-container img {
            max-width: 100%;
            height: auto;
        }

        .nombre {
            position: absolute;
            top: 66mm;
            width: 100%;
            font-size: 13pt;
            font-weight: bold;
            color: #000;
            padding: 0 5mm;
            box-sizing: border-box;
        }

        .footer-labels {
            position: absolute;
            bottom: 5mm;
            width: 100%;
            padding: 0 5mm;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            font-size: 9pt;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="cedula">
            <span id="cedula"></span>
        </div>

        <div class="qr-container">
            <img id="qr" alt="QR">
        </div>

        <div class="nombre">
            <span id="nombre"></span>
        </div>

        <div class="footer-labels">
            <span>MADELU</span>
            <span>BtoolsEC</span>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('cedula').textContent = params.get('cedula');
        document.getElementById('nombre').textContent = params.get('nombre');
        document.getElementById('qr').src = params.get('qr');
    </script>

</body>
</html>
